name: Otomatik Playlist Guncelle

on:
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da otomatik calisir
  workflow_dispatch: # Manuel calistirma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bagimliliklari Kur
      run: |
        pip install requests beautifulsoup4 lxml unidecode inquirer

    - name: Scripti Calistir
      run: |
        # Inquirer hatasini onlemek icin headless modda veya direkt servis bazli calistir
        # Scriptin parametrelerini kendi ihtiyacina gore buraya ekleyebilirsin
        python vxparser/main.py --auto

    - name: Degisiklikleri Kaydet
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Playlist otomatik güncellendi: $(date)" || exit 0
        git push
        
