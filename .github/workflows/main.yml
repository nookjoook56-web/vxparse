name: Otomatik Playlist Guncelle

on:
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bagimliliklari Kur
      run: |
        pip install requests beautifulsoup4 lxml unidecode inquirer

    - name: Scripti Calistir
      run: |
        # Dosyayı bul ve çalıştır (Klasör yapısı ne olursa olsun bulur)
        find . -name "main.py" -exec python {} --auto \;

    - name: Degisiklikleri Kaydet
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Playlist otomatik güncellendi: $(date)" || exit 0
        git push
